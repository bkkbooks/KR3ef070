body:
  text: 卷三傷寒論陽明病釋三余釋陽明病既竟更發架上書就陽明經腑之說謹匯而著於篇以見古人有先我言之者得力之原不敢忘也惜徵引不廣尚恨所見之少爾陽明經病集釋胃者人之根本胃氣壯五臟六腑之氣皆壯也足陽明是其經也中藏經右手關上脈陽實者足陽明經也脈經胃家者上脘至中脘兩穴處王樸莊燥氣為陽明本氣燥氣盛於上則胃氣實於中故陽明燥氣之為病為胃家實張令韶胃家實見邪到本經遂入胃而成胃實之證不然陽明病其胃不實者多矣於義安取乎喻嘉言胃家只舉病根在胃勿得即以為可下之證柯韻伯病之初傳陽明者但歸經而不歸腑不可謂舍下法無他法魏荔彤陽明之為病由太陽傳於其經則為陽明外證醫宗金鑑雖得陽明病未可便作裡實必審看脈色以別內外成無己太陽以皮毛為表陽明以肌肉為表而陽明之表又有二有外邪初傳之表有內熱達外之表柯韻伯太陽主表病情當以表辨陽明主裡病情雖仍在表而即當以里辨同上太陽經病為三陽之表陽明經病為三陽之裡張介賓太陽發熱自表而入里之熱也陽明發熱自里而出表之熱也魏荔彤太陽中風以汗出惡寒為正病太陽傷寒以無汗惡寒為正病若傳入陽明則以汗出惡熱為正病矣同上太陽有惡風惡寒傳陽明則變為惡熱此太陽陽明之大關鍵也太陽之絡近陽明故表初變熱即犯陽明之經同上陽明病有仍帶太陽者若去太陽漸遠則成陽明漸多同上身熱汗自出不惡寒反惡熱則病已去太陽入陽明吳人駒凡稱陽明病者皆身熱汗出不惡寒而惡熱者也王安道表邪已解故不惡寒裡熱已甚故反惡熱陳修園寒邪何故反為熱又何以而能熱蓋即本身中之火為寒所鬱而不得泄不泄則純熱而無寒矣趙養葵余於冬月正傷寒作寒鬱治其不惡寒者皆作火鬱治同上惡寒自罷汗出而熱仍不解即轉屬陽明之候當此之時無論風寒暑濕所感不同而同歸火化呂𣗪村陰陽之邪皆歸胃土無論三陽傳來之邪從而化熱即自三陰轉屬者亦變為熱故曰萬物所歸無所復傳程郊倩中土為萬物所歸凡表熱裡熱之邪無所不傳無所不化即與燥氣混為一家陳修園熱病煩已而汗脈當靜脈經數脈去來促急同上傷寒一日太陽二日陽明三日少陽乃傳經之次第其實不以日拘喻嘉言傷寒二日陽明為病陽明者胃之經也病源經曰尺寸俱長者陽明受病也當二三日發陽明氣血俱多邪並於經是以脈大成無己三日陽明脈大是為陽明邪實之正脈沈明宗經云陽明之至短而澀此指秋金司令之時脈言也又曰陽明脈象大浮者此指兩陽合明之病脈言也戴原禮三陰無再傳太陽之理但轉屬陽明耳故病七日以上行其經盡若欲作再經者針足陽明不預針太陽也閔芝慶陽明之氣主表面外合太陽主裡而內生津液張令韶汗者陽明之津液也汗出不徹則陽明燥熱之氣不得隨汗而泄太陽之標熱反內合其燥氣柯韻伯陰氣外溢則得汗陰氣內濡則便通薜立齋嘔者火氣炎上之象也故胃熱甚則嘔劉守真嘔因胃熱頗欲吐而見於受寒之一日此時嘔逆之機已伏龐安常不能食者是胃氣實但邪未入腑不作鬱熱耳汪苓友緊脈數如切繩狀脈經盜汗睡而汗出也陽明病表熱者自汗裡熱者盜汗成無己盜汗者睡中汗出睡則衛氣行里表中陽氣不致故津液得出覺則氣行於表而汗止王安道雜病盜汗責其陰虛傷寒盜汗由邪氣在半表裡使然也若邪氣在表則又謂之自汗矣樓英陽明主津液所生病故陽明法多汗者胃燥之因也柯韻伯蟲行皮膚中者即太陽證言身癢是也趙嗣真久虛者以表氣不足津液不充於皮膚使腠理枯澀汗難出也若謂虛則當補畢竟是陽明受邪為病未可忘也同上言久虛者明所以不能達出肌表之故也程郊倩邪熱欲出表作汗而正氣不能達所以胃亦不能實言久虛者所以明欲其熱之達表必令其汗之透表也魏荔彤遲脈呼吸三至去來極遲脈經陽明病桂麻二證乃風寒初中陽明之證而比太陽稍深故中風之脈不浮而遲傷寒之脈不緊而浮以風寒之氣已入肌肉之分則不僅為固閉而為壅鬱故也而治法則與太陽無少異尤在涇桂麻二方全為表邪而設見麻黃證即用麻黃湯見桂枝證即用桂枝湯不必問其為太陽陽明也若惡寒一罷則二方在所必禁矣陳修園外邪初入陽明用桂枝湯解肌則風邪仍從衛分出用麻黃湯發汗則寒邪仍從營分出喻嘉言嘔有太陽亦有陽明食谷欲嘔則屬胃寒與太陽之惡寒嘔逆原為熱證者相遠正恐誤以寒藥治寒嘔也服茱萸湯轉劇者仍屬太陽熱邪而非胃寒明矣喻嘉言下利清穀者其所利之穀食色不變氣不臭即完穀不化也此為裡寒故當與四逆湯汪苓友少陰癸水不能上合陽明戊土而下焦生陽之氣不升故用四逆湯以啟下焦生陽張令韶陽明以胃實為病根當更以胃寒為深慮柯韻伯風為陽邪陽能殺穀故中風者能食寒為陰邪陰不能殺穀故中寒者不能食成無己陽明氣血俱多中熱甚迫血妄行必作衄成無己伏熱在胃令人胸滿胸滿則氣逆氣逆則噦病源通觀經論並無呃證論中凡言噦者俱作呃解張隱菴諸經既有噦而無呃則凡經論言噦俱作呃解無疑高士宗雜病虛為不欲食實為欲食傷寒則胃中實熱者不能食虛熱者能食此為異也病源傷寒熱毒在胃並於心臟使神不安志不定遂發狂張兼善經云太陰所至為中滿脾乃陰中之太陰司濕土之化脾濕有餘故腹滿食不化凡始受熱中末傳寒中皆由脾胃之氣不能運化精微而制水穀聚而不散遂成脹滿也李明之陽明病中風陽明病若中寒皆是本經自受風寒之證非自太陽傳來者尤在涇陽明病若中寒之中字當作平聲言陽明中見太陰之氣化而為寒濕也張隱菴固瘕者寒氣結積也胃中寒津液不通行大便必硬成無己固瘕即初硬後溏者肛門雖固結而腸中不全乾也柯韻伯金匱云穀氣不消胃中苦濁濁氣下流小便不通身體盡黃名曰谷疸柯韻伯疸者黃也以其發於穀氣之熱故名谷疸成無己邪熱客於肺上焦有熱其人必飲水水停心下則肺為之浮肺主於咳水氣乘之故咳嗽病源須知陽明亦有手足厥者以胃主四肢故也然頭必苦痛而咳自與陰寒但厥者異林瀾胃氣上通於肺咽為胃腑之門此時咽痛非少陰證程郊倩冬陽明潮熱當行黃芩湯朱肱發熱而渴不惡寒者陽明也成無己傷寒發汗已則身涼若發汗已而灼熱者為風溫同上溫風之病脈陰陽俱浮汗出體重其息必鼾其形狀不仁嘿嘿但欲眠千金方凡感溫氣而病者皆可名為溫病不必各立名色只要知其病原之所以不同而辛溫辛涼之所以異治則生矣龐安常惟風傷衛惟溫傷氣惟辛涼解表為佳許知可麻黃桂枝為即病之傷寒設無與溫熱趙養葵溫病無陰陽之分故病必有陽而無陰藥必用寒而遠熱周禹載凡病傷寒而成溫者雖由於冬時之傷寒而根實種於其人之鬱火柯韻伯肝膽為發溫之源陽明為成溫之藪同上溫病雖異傷寒然熱雖甚不死以其病即傷寒中傳之病而溫病以之為初傳程郊倩風寒之邪始中太陽者十八九溫病之邪直行中道而起陽明者十八九陳素中楊慄山同傷寒自表傳裡里證皆表證侵入於內也溫病由里達表表證皆里證浮越於外也同上傷寒以發表為先溫病以清裡為主同上溫病之脈多在肌肉之分而不甚浮且右手反大於左手者由怫鬱在內故也同上溫病與傷寒雖曰不同而或清或攻後一節治法原無大異惟初病散表前一節治法則有天淵之別同上溫病發在春夏誤用辛溫解表是為抱薪救火惟用辛涼開其裡熱裡熱除則表熱自解同上傷寒一發汗而外邪即解溫病一發汗而里邪愈熾麻桂青龍用治傷寒未有不生者用治溫病未有不死者同上仲景兩條治法於傷寒則用溫散於溫病則用瀉熱同上表間有邪故身體重是陽明之帶表者當從胸部達之以胸為陽明裡中之表也王樸莊太陽少陽少陰皆有身重然非三經主證故專列於陽明沈芊綠自汗出而身重異於無汗而體痛多眠睡則熱勝而神昏息鼾語言難則氣壅而湊肺是當以辛散風以涼勝溫尤在涇太陽病桂枝證宜以桂枝解肌而反下之利遂不止是誤下而協表熱陷入於裡也醫宗金鑑促脈來去數時一止復來脈經促為陽盛之脈知表未解此表乃陽明經病也喘汗為裡熱氣逆已見腑病故當解陽明之表邪清胃腑之裡熱汪苓友喘汗脈促屬熱方中行下利不止脈促有力喘而汗出表雖未解而不惡寒是熱已陷陽明當從葛根黃芩黃連湯主治醫宗金鑑風邪初中病為在表一入於裡則變為熱治表必以葛根之辛治里必以芩連之苦蓋其病為表裡並受之病故其法亦表裡兩解之法尤在涇病有汗出而喘者謂因汗而有喘是邪熱外盛所致若喘而汗出謂因喘而有汗是裡熱氣逆所致成無己誤下虛其陽胃為熱所乘遂利不止此非腸胃虛證乃胃有邪熱下通於腸而作瀉也汪苓友太陽之邪雖已陷內亦可乘機而施升發即經所謂內者外之陷者舉之之妙使由外而入者仍可由內而出陳修園金匱治諸嘔吐谷不下小半夏湯小半夏加茯苓湯小半夏加橘皮湯皆可選用王樸莊汗出不惡寒反熱身重四者皆陽明之見證喻嘉言心中懊憹即是陽氣內陷成無己懊憹者鬱悶不舒之貌黃仲理凡邪氣在表舌則無苔及其傳裡而舌苔生邪之未深其苔不黑不澀若陽邪傳裡則其苔不滑而澀至舌上苔黃且焦黑者胃腑有邪熱也甚則黑苔而生芒刺熱更深矣張介賓頭者諸陽之會邪搏諸陽津液上湊則汗見於頭劉守真身無汗則熱不得越而上蒸陽分故但頭汗出張介賓病仍帶表者既不可下病已入里者又不可汗故梔豉湯為表裡兼治魏荔彤陽明梔豉湯猶太陽桂枝湯既可驅邪亦可救誤吳綬三陽合病是陽明熱證在經者以三陽統於陽明也徐洄溪三陽合病腹滿者陽明經病於前也身重者太陽經病合於後也難以轉側者少陽經病合於側也陳修園三陽合病證雖屬於三陽而熱則聚於胃故當從陽明證治白虎湯大清胃熱急救津液以存其陰也醫宗金鑑邪氣在表發熱者外熱里不熱也宜溫散之邪氣在裡發熱者裡熱甚而達於外也宜清之張介賓寒中之藥所以清火何以亦能解表蓋陽亢陰衰者即火盛而水涸何能作汗譬之乾鍋赤烈潤自何來故必以水濟火而用寒涼則始能解表也同上大熱之氣得辛涼而解猶之暑暍之氣得金風而爽故清涼之劑以白虎名之程知白虎湯專治陽明內蒸之熱非治陽明外見之熱張路玉經曰壯火食氣白虎湯所以瀉火即所以生氣也徐洄溪白虎一法乃仲景專於滋養肺胃之陰氣以復津液同上承氣苦寒逐熱蕩實為熱而且實者設白虎甘寒逐熱生津為熱而未實者設尤在涇有裡熱熾盛而外反惡風者必直撤其熱使表裡俱和而惡風乃止此非解表所能愈呂𣗪村白虎所治皆陽明燥證故當揭為陽明主方加人參者瀉胃火而扶元陰全不涉汗吐下三法柯韻伯白虎證即將來之大承氣證而裡熱未實從前之大青龍證而表寒已解者也表寒已解故不用麻桂裡熱未實故不用硝黃黃坤載譫妄之證輕者睡中有言重者不睡亦語言錯亂且有獨語者有其言必亂者有語言不休者因熱有輕重故也寇宗奭凡熱盛煩嘔呻吟錯語不得眠皆當服黃連解毒湯此直解熱毒除酷熱傳語諸人用之極效外臺秘要凡得時氣病五六日渴欲飲水七八日大渴欲飲水而忽然汗出者愈也千金方渴欲飲水者中焦熱也成無己渴欲飲水邪不在上而在中故必以白虎清胃熱滋胃陰經所謂熱淫於內治之以寒者是也尤在涇胃口津液枯竭內火如焚每欲飲水自救徐洄溪滑脈往來前卻流利展轉替替然與數相似脈經經文寒字當邪字解亦熱也故里有寒用白虎湯王三陽表有熱里有寒謂表有標熱里有本寒經所謂傷於寒則為病熱者是也陳修園傷寒之邪本是寒因里有寒指熱之所以然者言也周禹載脈微而厥為寒厥脈滑而厥為熱厥柯韻伯陽熱在裡陰氣被格陽反在內陰反在外其熱不除其厥不已故主白虎湯以清裡而除熱尤在涇邪熱客於上焦虛煩與梔子湯邪熱不客於上焦而容於中焦乾燥煩渴與白虎湯邪熱客於下焦為三焦俱熱與豬苓湯成無己麻黃連軺一法雖曰在裡必因邪在表時有失解散故雖發黃仍宜兼從汗解林瀾身熱發黃設有無汗之表宜用麻黃汗之若有成實之裡宜用茵陳蒿湯下之今外無可汗之表內無可下之裡宜用梔子黃柏清之醫宗金鑑胃和則邪當還表而解不解於衛則解於營汗出而解者從衛解也衄血而解者從營解也同上六經病解各從六氣王時可見經傳不是病傳張隱菴
