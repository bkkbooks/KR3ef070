body:
  text: 卷二傷寒論陽明病釋二陽明腑病六腑皆稱為腑三陽各自有腑而胃為六腑總司又獨得以腑稱也故曰腑病問曰病有太陽陽明有正陽陽明有少陽陽明何謂也答曰太陽陽明者脾約是也正陽陽明者胃家實是也少陽陽明者發汗利小便已胃中燥煩實大便難是也千金少陽作微陽此言其人未病時因津液之素虧而陽王者為巨陽因病中發汗利小便虧其津液而致陽王者為微陽若其津液既非素虧又非誤治所虧而病邪入胃以致胃燥者為正陽故所謂太陽者巨陽也所謂少陽者微陽也非三陽經之太陽少陽也問曰何緣得陽明病答曰太陽病發汗若下若利小便此亡津液胃中乾燥因轉屬陽明不更衣內實大便難者此名陽明也此言病自太陽經傳來而有此巨陽正陽微陽之三種也其不更衣者即巨陽陽明之脾約者是其內實者即正陽陽明之胃家實者是其大便難者即微陽陽明之大便難者是知三者之皆自太陽來則知太陽之非曰太陽經即千金之所以不曰少陽經者亦可明矣太陽病寸緩關浮尺弱其人發熱汗出復惡寒不嘔但心下痞者此以醫下之故也如其不下病人不惡寒而渴者此轉屬陽明也小便數者大便必硬不更衣十日無所苦也此言本太陽病脈證皆屬桂枝一誤下而惡寒不渴者即一變而為渴不惡寒矣不下謂下之而無所下即是素來之脾約雖不更衣非承氣證故即至十日亦無所苦病人煩熱汗出則解又如瘧狀日晡所發熱者屬陽明也此言汗出後病已解而又往來寒熱如瘧狀發於日晡所者則是陽明王時故知其已屬陽明矣如瘧本太陽病柴胡亦太陽方趺陽脈浮而澀浮則胃氣強澀則小便數浮澀相搏大便則硬其脾為約麻仁丸主之此言脾不為胃行津液故大便堅而脈亦為之澀也溲數則腸本燥而為巨陽陽明也趺陽為胃脈在足跗上動脈應手處陽明病發潮熱大便溏小便自可胸脅滿不去者小柴胡湯主之陽明病脅下硬滿不大便而嘔舌上白苔者可與小柴胡湯上焦得通津液得下胃氣因和身濈然而汗出解也此其病亦當有如瘧狀而為微陽陽明也苔白則病微大便或溏或否則病亦微且不溏而嘔則其病在上不在下故但須和解即得汗愈陽明病本自汗出醫更重發汗病已瘥尚微煩不了了者此大便必硬故也以亡津液胃中乾燥故令大便硬當問其小便日幾行若本小便日三四行今日再行故知大便不久出今為小便數如字少以津液當還入胃中故知不久必大便也此言欲用下法時設有一不必下之證即不必輕言下也脈陽微而汗出少者為自和也汗出多者為太過陽脈實因發其汗出多者亦為太過太過為陽絶於里亡津液大便因硬也脈浮而芤浮為陽芤為陰浮芤相搏胃氣生熱其陽則絶此皆言陽之盛者甚而欲絶也明乎大便之硬總由津液之傷而津液之傷總由陽盛之故則欲保津液者不當使陽不盛乎脈陽微即陽未盛為微陽故得自和非陽虛之謂至芤脈之如蔥所謂中央空兩邊實者謂浮按其表一邊沉按其里一邊兩邊俱實正謂表裡俱實意亦不重在中空也不然何以脈芤而陽盛如此耶病人不大便五六日繞臍痛煩躁發作有時者此有燥屎故使不大便也此仲景特出燥屎二字令千萬世有治法也五六日不大便而痛繞臍煩且躁即不是十日無所苦之不大便矣病家於此須知燥屎為胃腑主證凡潮熱譫語一步緊一步如後逐條云云者皆此燥屎為患為病人可生可死之關即當為病人求出死入生之路病在陽明之經雖大不大一用芩連膏知即能化大為小病到陽明之腑不危亦危非用硝黃枳朴不能轉危為安病應下下之安乃為穩當勿轉認不敢下而致危者為穩當也傷寒四五日脈沉而喘滿沉為在裡而反發其汗津液越出大便為難表虛里實久則譫語此言脈沉本以裡實之故發汗徒虛其表而其裡實則如故也實之既久安得不譫語耶譫語為燥屎確據太陽病三日發汗不解蒸蒸發熱者屬胃也調胃承氣湯主之此言裡熱不同於表熱也表熱之熱曰翕翕裡熱之熱曰蒸蒸熱蒸於內已在汗後非發汗所能解矣故宜調其胃陽明病不吐不下心煩者可與調胃承氣湯傷寒吐後腹滿者與調胃承氣湯此言心煩腹滿皆為胃不和故無論吐不吐並宜調胃太陽病若吐若下若發汗後微煩小便數大便因硬者與小承氣湯和之則愈陽明病其人多汗以津液外出胃中燥大便必硬硬則譫語小承氣湯主之若一服譫語止更莫復服此言汗吐下多致胃燥胃燥者多作譫語若譫語止則胃已得和而大便將行矣故不必再服下利譫語者有燥屎也宜小承氣湯此可見下利者仍有燥屎即仍為當下之證勿疑陽明病譫語有潮熱反不能食者胃中必有燥屎五六枚也若能食者但硬耳宜大承氣湯下之此又以潮熱為燥屎確據也五六枚以大腸回薄間所容之地計之只此五六枚之燥屎已足令病即於危則燥屎之為患豈不大哉必求若陽明脈解所稱棄衣登高逾垣上屋所上之處皆非其素所能也者而後下之則所失已多矣宜大承氣語意當在能食句上二陽並病太陽證罷但發潮熱手足漐漐汗出大便難而譫語者下之則愈宜大承氣湯此言汗在四肢而身無汗也漐漐汗小而又不輟之貌是為裡熱所蒸故仍潮熱譫語為承氣證汗出譫語者以有燥屎在胃中此為風也須下之過經乃可下之下之若早語言必亂以表虛里實故也下之則愈宜大承氣湯此言下必審其遲早也早則尚在表虛時至過經則必為裡實矣仲景曰若欲作再經者針足陽明使經不傳則愈即謂過經則宜治胃也病至此陽盛矣叔和序例曰陽盛陰虛汗之則死下之則愈蓋謂陽實則陰被劫不撤其熱則陰日虛故此之所謂陰虛者乃下之則愈之虛不是不可下之之虛也苟非苦寒勝熱將何以瀉亢甚之陽而救垂絶之陰乎胃風一證病家亦久無聞矣病人小便不利大便乍難乍易時有微熱喘冒不能臥者有燥屎也宜大承氣湯此言大便雖有易時而喘冒至臥不安則胃大不和故知其仍有燥屎也然在病家見有易時即不知其尚有燥屎雖有明者其能為病家言仍當用承氣乎此時一誤勢將無及故在溫熱病中凡協熱而利與夫熱結旁流且更有膠閉而不為燥屎者皆不可不使病家知也大下後六七日不大便煩不解腹滿痛者有燥屎也所以然者本有宿食故也宜大承氣湯此言未病時本有宿食宜先消導乃不消導而遽下之則宿食仍不隨利減過六七日當復結所以煩滿亦不除也陽明少陽合病必下利其脈不負者順也負者失也互相剋賊名為負也脈滑而數者有宿食也當下之宜大承氣湯此亦請以戰喻之意故以勝負為言胃氣有權則勝少陽負則木不剋土矣亦猶少陰負趺陽為順少陰負則土能制水矣脈得滑數即陽明不負之象且可為宿食之徵故不治木而治土腹滿不減減不足言當下之宜大承氣湯此言已下而腹尚滿必其下之不盡故也當更下之勿疑傷寒若吐若下後不解不大便五六日上至十餘日日晡所發潮熱不惡寒獨語如見鬼狀若劇者發則不識人循衣摸床惕而不安微喘直視脈滑者生澀者死微者但發熱譫語者大承氣湯主之若一服利止後服脈滑之滑字遵醫宗金鑑改此言下證悉具而有危殆之勢也不識人如見鬼則神明內亂矣然一服承氣尚可得生故此時非承氣不為功止後服非僅止之而已接方之宜用何藥不賴有定識耶陽明病發熱汗多者急下之宜大承氣湯發汗不解腹滿痛者急下之宜大承氣湯傷寒六七日目中不了了睛不和無表裡證大便難身微熱者此為實也急下之宜大承氣湯此總言陽明腑之宜下證也有此數證即有急不可待之勢非於逐條所言外另有此三條之為急也無表裡證豈真無表裡證哉病至目睛不和則神昏如醉幾無一證之可以指名矣經曰熱病目不明熱不已者死危哉少陰病二三日不大便口燥咽乾者急下之宜大承氣湯少陰病六七日腹脹不大便者急下之宜大承氣湯少陰病自利清水色純青心下必痛口乾舌燥者急下之宜大承氣湯此皆少陰溜腑之宜下者也燥屎為下證而自利清水其為色青青即黑也亦為下證如見有少陰病之脈微欲寐而又口乾舌燥則腎水有立涸之勢病至此下之則愈不下則危遲則雖下亦危不下必危矣下法之當急如此熱利下重者白頭翁湯主之下利欲飲水者以有熱故也白頭翁湯主之此厥陰溜腑之宜下者也凡後重必苦裡急亦當下之而下其實與下其燥下法又各不同傷寒噦而腹滿視其前後知何部不利利之則愈此太陰溜腑之宜下者也腹滿不利則噦為熱噦而非冷噦前指小便言後指大便言如其不利在後亦宜下之傷寒脈浮而緩手足溫是為系在太陰太陰者身當發黃若小便自利者不能發黃至七八日大便硬為陽明病也傷寒轉系陽明者其人濈然微汗出也此亦太陰溜腑之宜下者也下之宜茵陳湯之類經云脈諸緩者多熱陽明病發熱汗出此為熱越不能發黃也但頭汗出身無汗劑頸而還小便不利渴引水漿者此為淤熱在裡身必發黃茵陳蒿湯主之傷寒七八日身黃如橘子色小便不利腹微滿者茵陳蒿湯主之此言發黃之為病無論陽黃陰黃皆不外乎茵陳而陽黃宜大黃山梔陰黃即宜附子乾薑正不可誤傷寒六七日結胸熱實脈沉而緊心下痛按之如石硬者大陷胸湯主之小結胸正在心下按之則痛脈浮滑者小陷胸湯主之此言結胸有大小之別其大者亦下證也陽明之脈在經多浮在腑多沉其緊亦不是寒太陽下早熱入而作結胸者即此證陽明病其人喜忘者必有畜血所以然者本有久瘀血故令喜忘屎雖硬大便反易其色必黑宜抵當湯下之此言畜血者亦為下證也太陽所云善忘如狂血證諦也者即此證諸血見血畜血不見血畜止也猶止水也陽明病下血譫語者此為熱入血室但頭汗出者刺期門隨其實而瀉之濈然汗出則愈此即協熱而便膿血也熱入血室不獨是畜血一證婦人中風發熱惡寒經水適來七八日熱除而脈遲身涼胸脅下滿如結胸狀此為熱入血室當刺期門婦人中風七八日續得寒熱發作有時經水適斷此為熱入血室其血必結故使如瘧狀發作有時小柴胡湯主之婦人傷寒發熱經水適來晝日明瞭暮則譫語如見鬼狀者此為熱入血室無犯胃氣及上二焦必自愈此言譫語之來路有不同也熱入血室亦能譫語而病則不在胃家即非承氣之證故曰無犯胃氣然則外臺所引小品犀角地黃湯正是對病之方矣仲景於熱在血室必曰無犯胃氣則仲景於熱在胃氣亦必曰無犯血室可知此余所以有犀角膏黃之辨也沖為血海心經為血室主肝藏血亦名血室期門穴肝之募也男婦皆有此證而婦人尤易夫實則譫語虛則鄭聲鄭聲重語也直視譫語喘滿者死下利者亦死此條以邪未實之虛襯出邪氣盛之實不是謂體虛之虛也譫語鄭聲其為熱證無甚分別病至此不可謂不重矣特未至於直視則其為譫語也尚不過呻吟之聲而不至於死故此節所重專在直視一證前人於實字既云堅滿燥實可下之邪則亦未始不以實字作邪字解矣實既非體實之實則虛即非體虛之虛而亦非待補之虛可知仲景於此特出鄭聲二字而又申之曰鄭聲重語也者以見如夢如囈之鄭聲僅為合目下垂之狀不比妄言妄見之譫語必有張目上竄之形所以下文兩死字不接在鄭聲下仍接在譫語下豈不曰病不必以鄭聲死且未必以譫語死而惟直視者之譫語則死譫語而又喘滿則死直視喘滿而又為下利之譫語則亦死此內經所以言虛則可治實則死也喘為陽上脫利為陰下脫胃居中土熱結於中不早清之任其劫津殆盡致陰陽交脫於上下直至無法可治使能早用清法何至於此發汗多若重發汗者亡其陽譫語脈短者死脈自和者不死此又以脈之短不短為譫語者決死生也亡陽即亡津液之謂汗而又汗以致脈短則津液已涸不可治矣若脈不短雖至譫語尚可生也安得不於脈未短時早為計乎得病二三日脈弱無太陽柴胡證煩躁心下硬至四五日雖能食以小承氣湯少少與微和之令小安至六日與承氣湯一升若不大便六七日小便少者雖不能食但初頭硬後必溏未定成硬攻之必溏須小便利屎定硬乃可攻之宜大承氣湯陽明病脈遲雖汗出不惡寒者其身必重短氣腹滿而喘有潮熱者此外欲解可攻裡也手足濈然汗出者此大便已硬也大承氣湯主之若汗多微發熱惡寒者外未解也其熱不潮未可與承氣湯若腹大滿不通者可與小承氣湯微和胃氣勿令大泄下陽明病潮熱大便微硬者可與大承氣湯不硬者勿與之若不大便六七日恐有燥屎欲知之句法少與小承氣湯湯入句腹中轉失氣者此有燥屎乃可攻之若不轉失氣者此但初頭硬後必溏不可攻之攻之必脹滿不能食也欲飲水者與水則噦其後發熱者必大便復硬而少也以小承氣湯和之不轉失氣者慎不可攻也一本失皆作矢陽明病譫語發潮熱脈滑而疾者小承氣湯主之因與承氣湯一升腹中轉失氣者更服一升若不轉失氣者勿更與之明日不大便脈微澀者裡虛也為難治不可更與承氣湯此數條許多斟酌總是教人用承氣既必於外之解否為辨而又必以不可更服為戒蓋既不得於燥屎之未結而遽用之又必及其津液之未涸而即用之若至津液已罄真氣果虛則承氣有不可再用者矣余嘗謂但有一毫惡寒即不得施用下法此即外未解之說也又嘗謂病到此時並不得施用下法此即不可更與之說也傷寒嘔多雖有陽明證不可攻之陽明病面合赤色不可攻之攻之必發熱色黃小便不利陽明病心下硬滿者不可攻之攻之利遂不止者死利止者愈陽明病下之心中懊憹而煩胃中有燥屎者可攻腹微滿初頭硬後必溏不可攻之陽明病自汗出若發汗小便自利此為津液內竭大便雖硬不可攻之當須自欲大便宜蜜煎導而通之若土瓜根及與大豬膽汁皆可為導此數條於可攻之外又垂不可攻之訓總是教人於彼一面認得清楚則於此一面自識得堅決此數條之所謂不可攻者正謂苟其不然則攻即不可緩耳陽明經腑之病苟能用仲景之法雖瀕於危尚有得生者況治之干早不使病大本不定即於危耶余故曰陽明無死證仲景傷寒論見隋書經籍志隋時必有定本惜無可考今按成無己於原文堅字皆作硬且於欲作堅瘕句改為欲作固瘕於堅者即愈句改為脈緊則愈疑皆避隋文帝諱如曹憲之避煬帝諱而改廣雅為博雅也已故晉王叔和脈經用堅而唐孫思邈千金翼仍作堅亦若博雅之返為廣雅也可見聊攝所據尚是隋時原本是可貴矣
