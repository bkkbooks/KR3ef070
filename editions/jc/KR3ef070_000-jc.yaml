body:
  text: 附陽明餘論得病二三日心胸煩悶此為有痰實者便宜取吐病源寒多熱少可吐者此屬痰多也同上仲景所謂胸有寒當吐之者寒者痰也內蘊之痰壅塞膈間也所謂病人有寒胃中冷者冷亦痰也有形之痰結於一處也所謂邪結在胸中當須吐之者可見痰之結在胸也合三條總見痰證可吐不可汗宜遵內經高者越之之旨余故於三陽經後特立痰證一門喻嘉言傷寒病證在表或未發汗或經發汗未解或吐下後熱不除此毒氣盛故也毒既未散而表已虛熱毒乘虛出於皮膚所以發斑瘡隱軫如錦也重者喉口身體皆成瘡病源熱微者赤斑出劇者黑斑出赤斑出者五死一生黑斑出者十死一生病者過日不以時下之熱不得泄胃爛斑出外臺秘要熱毒在外未入於胃而先下之熱乘虛入即爛胃也然熱入胃要須除下之不可留於胃中胃虛熱入亦爛胃千金方傷寒發斑全由胃熱冬溫夏熱發斑之類皆是其形焮腫如蚊蚤所齧或成片如錦紋加味升麻湯升麻葛根湯黃連解毒湯人參白虎湯選用胃爛犀角解毒湯沈芊綠金匱云背反張臥不著席腳攣急必齘齒卒口噤此為燥即痙也亦陽明之所有事也王樸莊大便閉結大腸膠閉協熱下利熱結旁流四者總之邪在裡也其證不同在乎通塞之間耳吳又可大便閉結者溫邪傳裡內熱壅鬱宿垢不行蒸而為結漸至堅硬下之結糞一行淤熱自除諸證悉去同上大腸膠閉者其人平素大便不實溫邪傳裡但蒸作極臭如膠黏至死不結但愈蒸愈閉以致胃氣不能下行溫毒無路可出不下即死但得黏膠一去下證自除霍然而愈同上協熱下利者其人大便素不調溫邪忽乘於胃宜小承氣湯撤其邪而利自止二三日仍如前證此伏邪未盡復傳到胃也治法如前同上熱結旁流者溫邪傳裡將糞結住不下只能於糞旁流出臭水並所進湯藥全然無糞宜大承氣湯得結糞而利自止不得結糞邪仍在也病必不減宜更下之吳又可劉松峰同愈後大便數日不行別無他證乃足三陰不足大腸虛燥此不可攻飲食漸加津液流通自能潤下也同上大病瘥後血氣必虛凡費心費力過喜過怒多言多動皆可因勞而復病也因勞而動其既虛之血氣生其未盡之餘熱熱邪退而病差熱邪生而病復凡病皆然魏荔彤病後虛羸少氣仍是為熱所傷之陰未能遽復故仲景取用石膏玉樸莊病後強食則有遺熱經曰食入於陰長氣於陽故奪其食則已仲景亦曰損谷則愈同上凡病新瘥只宜先進白稀粥次進濃者又次進糜粥亦須少少與之不得過吃肉食龐安常跋昔人有言十年讀書天下無不可治之病十年治病天下更無可讀之書此非治病多者不能道亦非善讀書者不敢道也軫自通籍後從事於斯有年所矣泛覽各家之書非食古不化即師心自用迨持以臨證恆苦齟齬難合幾疑此事已成絕學既而從吾師遊得讀世補齋書知神明變化不越軒岐仲景之言每見吾師用藥必先分經辨證而於陽明病尤應手立效常謂軫曰陽明無死證而不解世人之病何以多死於陽明既自作陽明病釋二卷又集前人之釋陽明者亦二卷益以見先路之導重賴前賢惟善讀者引申觸類則片義單詞具存妙用特無人焉匯而輯之則散見各書者病家每苦於不知耳夫醫學自宋元以來荒蕪穢雜人自為書其書愈多其道愈晦得吾師起而廓清之庶曉然於微言未絕斯道大有傳人蘇子譫稱昌黎文起八代之衰軫於吾師之所以論醫者亦云光緒十年歲次甲申仲夏望日受業年愚侄方連軫謹跋
