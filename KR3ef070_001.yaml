body:
  text: 卷一傷寒論陽明病釋一陽明經病經為六經十二經之總稱此則與腑對舉之經也故曰經病陽明之為病胃家實也按千金翼於此句胃家實作胃中寒影宋本傷寒論自注云實一作寒此仲景陽明提綱為傷寒成溫之候也陽明屬胃故曰胃家胃家者中焦也實者邪也太陽寒水之邪至此而從陽明燥化則邪到胃經是為陽明經病前人乃謂陽明以腑病提綱何也夫既曰六經之綱自當皆以經言胡獨於陽明而以腑言蓋不知邪之所到即謂之實而必以堅滿燥實之當下者方謂之實故實字之不解誤即自此而起且陽明不見有經病而經病之清法亦自此廢矣問曰陽明病外證云何答曰身熱汗自出不惡寒反惡熱也此陽明經病之始也陽明有經腑之分外者對里而言腑為里則經為外不言經而言外者所以別於六經之經也身熱汗出為太陽陽明公共證惟惡熱不惡寒為陽明所獨寒水之邪當惡寒今不惡寒而惡熱故曰反病既反則治亦反應用辛涼者不得仍用辛溫矣身熱表熱也惡熱裡熱也其人到處而表裡皆熱也問曰病有得之一日不發熱而惡寒者何也答曰雖得之一日惡寒將自罷即自汗出而惡熱也千金於發熱上無不字此言惡寒惡熱為太陽陽明分際之的然者惟其在太陽時惡寒之甚即可知其時將有大熱而病陽明矣問曰惡寒何故自罷答曰陽明居中土也萬物所歸無所復傳始雖惡寒二日自止此為陽明病也此言惡寒罷而又惡熱則病不從太陽解也自罷謂不曾解肌發表而始之惡寒者至此自不惡寒此可見其欲傳陽明矣土為萬物所歸無所復傳治苟如法病無不愈此即陽明無死證之理凡六經病皆當以素問熱病論參看傷寒二三日陽明少陽證不見者為不傳也千金作其二陽證不見為不傳此言病即從太陽解而不傳陽明亦不傳少陽也太陽為三陽陽明為二陽少陽為一陽傷寒一日太陽受之脈若靜者為不傳頗欲吐若躁煩脈數急者為傳也此言病不從太陽解則必傳陽明也脈數急與太陽脈之浮緩浮緊亦相反一日字不必泥猶曰始初云爾傷寒三日陽明脈大此言病在太陽脈雖浮而不大今一日惡寒二日不惡寒三日且惡熱脈又浮中見大則太陽之邪不從少陽樞轉而陽明之病勢已定三日少陽經氣也大即數急之象經曰足陽明五臟六腑之海也其脈大血多氣盛熱壯本太陽初得病時發其汗汗先出不徹因轉屬陽明也傷寒發熱無汗嘔不能食而反汗出濈濈然者是轉屬陽明此皆中陽溜經之病凡勘陽明證首當察其汗如汗出不通達及始無汗而繼濈然者皆非解病之汗而為加病之汗也濈濈汗之微者汗不通達所出又微則陽熱內燔矣仲景於太陽陽明分際一再言之如此陽明病脈浮而緊者必潮熱發作有時但浮者必盜汗出此言脈不緊而但浮則邪猶向外其陽雖盛而衛氣行陰則陽便得和故目合即能有汗名曰盜汗非虛汗也陽明於日晡所必發熱如潮有信故曰潮此條重在末句脈但浮為經病陽明病法多汗反無汗其身如蟲行皮中狀此以久虛故也此以其人素有寒飲汗又不從元府出而漬於肌膚則邪不自達如蟲在皮中行者不能作汗身必癢也陽明病脈遲汗出多微惡寒者表未解也可發汗宜桂枝湯此言病雖及胃而尚未離太陽也惡寒為太陽主證表未解指惡寒一證言就太陽指陽明為里就陽明指太陽為表非謂身有熱為表未解也陽明之病身無不熱者也因其汗出脈遲而仍惡寒故知為太陽未罷之桂枝證陽明病脈浮無汗而喘發汗則愈宜麻黃湯太陽與陽明合病喘而胸滿者不可下宜麻黃湯此亦病及胃而未離太陽者無汗為麻黃湯主證喘即因於無汗若一有汗即不喘矣因其無汗而喘脈必兼緊亦必惡寒故知為太陽未罷之麻黃證凡病有此二證時皆不得早用辛涼食谷欲嘔屬陽明也吳茱萸湯主之得湯反劇者屬上焦也此言茱萸湯原可治中焦胃寒之嘔而太陽病之甚於上焦者即防化熱則不是胃寒故得之反劇若脈浮遲表熱裡寒下利清穀者四逆湯主之此水寒在胃未成實熱之陽明也邪到胃家必熱而亦有不即熱者未熱仍為寒水而水之寒惟附子足以制之陽明病中所謂虛寒虛冷皆指寒水在胃言水者飲也飲即痰也凡病有此二證時皆不得誤用苦寒陽明病若能食名中風不能食名中寒此以能食不能食為風寒之分初病陽明時宜有此辨別脈浮發熱口乾鼻燥能食者則衄此言能食為中風風為陽邪故口鼻乾燥必動營而致衄若胃中虛冷其人不能食者飲水則噦時有以水潠之灌之等法皆所謂與水也陽明病不能食攻其熱必噦所以然者胃中虛冷故也以其人本虛故攻其熱必噦巢氏病源於條首六字之下再有下之不解其人不能食九字千金同此言不能食為中寒冷即寒水也陽明以有燥屎為實熱故以無燥屎為虛冷凡病之宜於攻者必其病之已有實熱者也若無實熱即為虛冷其人本虛者謂本無燥屎之實非謂其有當補之虛也但教人以不可攻耳此所謂噦皆是冷噦陽明病初欲食小便反不利大便自調其人骨節疼翕翕如有熱狀奄然發狂濈然汗出而解者此水不勝穀氣與汗共並脈緊則愈千金於此條末句作堅者即愈此有小小戰汗意奄忽也欲食則穀氣尚能與水敵故水氣不能勝谷而得忽然化汗其時轉以便堅為幸水負則土勝矣土宜令勝故戒妄攻陽明中風口苦咽乾腹滿微喘發熱惡寒脈浮而緊若下之則腹滿小便難也此亦因中風而病及胃者脾與胃以膜相連腹滿為太陰主證誤下則太陰脾失轉運之權而少陽三焦亦失決瀆之司陽明病若中寒不能食小便不利手足濈然汗出此欲作固瘕必大便初硬後溏所以然者胃中冷水穀不別故也千金於硬字皆作堅固瘕亦作堅瘕此則因中寒而病及胃者亦以其病尚屬寒水故水氣與穀氣不能分別即不定為燥屎而但作堅瘕陽明病脈遲食難用飽飽則微煩頭眩者必小便難此欲作谷疸雖下之腹滿如故所以然者脈遲故也此言脈遲而不大不數急知其有寒水在胃即太陽證有未罷也此二條亦戒妄攻以上皆胃有寒水或太陽陽明合病或太陽證有未罷皆非陽明正病也故宜溫劑不宜寒藥此後則皆傷寒成溫之證矣陽明經病之實者為火陽明經病之虛者為水此祕余獨得之陽明病反無汗而小便利二三日嘔而咳手足厥者必苦頭痛若不嘔不咳手足不厥者頭不痛陽明病但頭眩不惡寒故能食而咳其人必咽痛若不咳者咽不痛此二條千金於條首陽明上皆特出冬字疑上條之反無汗下條之不惡寒既屬陽明應即謂冬溫病也此言頭中之病皆水氣上逆而不降也水得熱助則上下行而寒飲即化痰熱二三日前水氣向下則小便利二三日後水氣向上則嘔而咳其咽之痛即因於咳故不咳則不痛其頭之痛即因於熱故不厥則不痛厥謂手足冷厥則熱不外達不惡寒而反無汗則熱不外越此時裡熱已甚漸有成溫之勢矣太陽病發熱而渴不惡寒者為溫病若發汗已身灼熱者名曰風溫風溫為病脈陰陽俱浮自汗出身重多眠睡鼻息必鼾語言難出若被下者小便不利直視失溲若被火者微發黃色劇則如驚駭時瘈瘲若火熏之一逆尚引日再逆促命期時有以火劫發汗燒針令其汗等法皆所謂被火也今之用滋陰藥誤者與水同用辛熱藥誤者與火同此言風溫病為辛溫藥所誤故特以渴不惡寒另為溫病提綱病在太陽不渴病在太陽必惡寒故渴不惡寒四字定是陽明主證而下文之昏沉譫妄亦一一皆顯陽明經證也仲景於溫病一條如是之詳且盡而謂仲景不知春夏可乎汗下火皆誤所少者清法耳仲景所以不出方者以清法輕重不一非可泥定一方故也凡人因風病熱即是風溫因濕病熱即是濕溫以證言也冬月病熱即曰冬溫春月病熱即曰春溫以時言也春為風風溫在春為多而原其始無不本於傷寒故傷寒論中自有溫熱濕溫病也太陽病桂枝證醫反下之利遂不止脈促者表未解也喘而汗出者葛根黃芩黃連湯主之此言本太陽病之宜於辛溫者一經誤下則邪陷陽明之裡而又脈促喘汗則尚有陽明之表必以此湯兩和其表裡也邪陷是實不是虛所謂實者即邪熱也故即當以辛涼解之此湯乃仲景治溫病之辛涼輕劑可取以作陽明主方太陽與陽明合病必自下利葛根湯主之太陽與陽明合病不下利但嘔者葛根加半夏湯主之千金於此二條自注用葛根湯一云葛根黃芩黃連湯此不言合病為何證而但以下利言之則病偏於陽明矣陽明病脈浮而緊咽燥口苦腹滿而喘發熱汗出不惡寒反惡熱身重若發汗則躁心憒憒反譫語加溫針必怵惕煩躁不得眠若下之則胃中空虛客氣動膈心中懊憹舌上苔者梔子豉湯主之時汗法以附子烏頭下法以巴豆小丸子再有燒針火劫等法實皆非法也故以此救之此言其人陽明證具即當用清以去其熱而當時治法所少者獨在清耳仲景出而有清法於是陽明無死證故芩連膏知梔子黃柏皆為經病所不可少心中懊憹者三句語意當在汗下溫針之上陽明病下之其外有熱手足溫不結胸心中懊憹飢不能食但頭汗出者梔子豉湯主之此申説懊憹一證以見熱之不獨在外也懊憹即譫語之漸飢不能食即躁煩之徵三陽合病腹滿身重難以轉側口不仁而面垢譫語遺尿發汗則譫語甚下之則額上生汗手足厥冷白虎湯主之巢氏病源讝俱作諴千金方讝語俱作譫語此仲景特出譫語兩字舉陽明之重證言也病至此陽盛而陰必虛矣白虎之治所以防陰之將虛惟用清法可使液自不減蓋欲陰之不虛必撤其陽實不用白虎則實之不去虛即難保可懼哉白虎湯主之語意在汗下之上三陽合病脈浮大上關上但欲眠睡目合則汗此言關上為少陽部分其脈弦大可知若渴欲飲水口乾舌燥者白虎湯主之此又以渴欲飲水為溫病的據且必於口舌驗之傷寒脈浮滑此表有熱里有寒白虎湯主之此言表有熱為外熱里有寒即裡熱也表之寒已化為熱而里之水仍得云寒故寒即是熱於何知之於浮滑脈之見於氣口者知之也滑者痰熱之脈也就表指胃為里傷寒脈滑而厥者里有熱也白虎湯主之此為熱厥而非寒厥陽盛於內格陰於外也於何知之即於既厥而脈仍滑者知之也里有熱里有寒皆主白虎可知言寒之即言熱矣此厥陰之危證里亦指胃言傷寒脈浮發熱無汗其表不解者不可與白虎湯渴欲飲水無表證白虎湯主之千金人參白虎湯即系此條下此白虎湯禁也仲景每用一方必言一方之禁者欲得一方之利必絶一方之弊六經皆然表不解義見前傷寒無大熱口燥渴心煩背微惡寒者白虎加人參湯主之此言肌表無大熱背且微惡寒則熱全入里而外幾不見有熱矣裡熱之甚者其表熱必轉微而口燥心煩則甚服桂枝湯大汗出後大煩渴不解脈洪大者白虎加人參湯主之服柴胡湯已渴者屬陽明也以法治之此言發表之後大煩大渴脈又洪大則陰之被劫甚矣故非用白虎清之不可也以法治之者亦不外乎清耳傷寒若吐若下後七八日不解熱結在裡表裡俱熱時時惡風大渴舌上乾燥而煩欲飲水數升者白虎加人參湯主之此又因吐下之誤而陰之被劫者益甚也此時舍白虎之清無救陰之法使其早用白虎亦何嘗必見此危證耶煩渴是白虎證確據熱極則生風此之惡風直欲引動內風而將見痙厥矣若脈浮發熱渴欲飲水小便不利者豬苓湯主之此與五苓散同法皆以飲水多而為水逆者用之也五苓於利水中兼發表此湯於利水中兼顧陰然必溲少者乃可用陽明病汗出多而渴者不可與豬苓湯以汗多胃中燥豬苓湯復利其小便故也此言陽明主津液所生病水從汗出即不可再由溲去故如豬苓之利水即宜慎之陽明中風不得汗其人嗜臥一身及面目悉黃小便難陽明病無汗小便不利心中懊憹者身必發黃陽明病被火額上微汗出小便不利者身必發黃傷寒瘀熱在裡身必發黃麻黃連軺赤小豆湯主之連軺是連翹根傷寒身黃髮熱者梔子柏皮湯主之柏皮謂黃柏連皮用此以上皆言發黃者必無汗若有汗即不能發黃亦猶有汗之即不喘耳無汗而喘必發其汗無汗而黃必去其熱一理也小便之有無亦同若黃汗則別為一證傷寒發汗已身目為黃所以然者以寒濕在裡故也以為不可下也於寒濕中求之此言黃有陰陽之別凡陽黃色鮮明陰黃色淤晦若是寒濕即為陰黃此仲景教人辨證之法陽明病口燥但欲嗽水不欲咽者此必衄此言熱甚致衄而病亦有可解之機也血之與汗異名同類不得汗而得衄鬱熱一清病亦可解仲景所以有衄乃解之訓也凡病之有斑疹者未始不因不衄之故陽明病欲解時從申至戌上此以申酉即日晡所是為陽明王時病氣得經氣之助乃解然此惟經病能之若一入腑則當其王時正狂譫益甚時矣所以治陽明者必使在經得解不至入腑乃為上手若果於此去病不見此後危證願病家勿但謂其能愈小病而忽之
