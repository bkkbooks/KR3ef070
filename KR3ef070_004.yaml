body:
  text: 卷四傷寒論陽明病釋四陽明腑病集釋正陽明腑病者由表而傳裡由經而入腑也張介賓太陽經病多於腑病陽明則腑病多於經病以經邪不能久留而腑邪常聚而不行也尤在涇脾約輕於大便難大便難輕於胃家實蓋脾約便難每因津液素虧或施治失宜所致若胃實則其人陽氣素盛胃有宿食即未經汗下而亦入胃成實也醫宗金鑑已經汗下者為奪血致燥之陽明以滋燥為主未經汗下者為熱盛致燥之陽明以攻熱為急同上古人登廁必更衣不更衣者通為不大便成無己大便許攻小便不許利何也攻大便則內熱除利小便則津液傷王宇泰十日不更衣而不用攻伐何也以此非結熱雖不大便而無潮熱譫語當須審慎勿以日數久而輒為攻下也張兼善轉屬陽明者有內外之不同太陽發汗不徹而轉屬陽明其病在外不因發汗反自汗出而轉屬陽明其病在內則知陽明之轉屬有內外表里之異張隱菴如瘧者發作有時或日再發或日二三發邪氣微也成無己澀脈細而遲往來難且散或一止復來脈經脾主為胃行津液者也脾不能為胃行其津液故約其食物如一二彈丸程知潮熱屬陽明必於日晡時發乃為潮熱若日三五發者則是發熱非潮熱也劉守真申酉戌間獨熱余時不熱者為潮熱方中行舌者心之苗本紅而澤傷寒三四日舌上有膜白滑如苔甚者或燥或澀或黃或黑是數者熱氣淺深之謂也成無己邪在表者舌尚無苔熱邪傳裡津液搏結則舌生苔矣同上舌上白苔者熱未入胃也若舌生黃苔則熱已入胃甚則苔黑或生芒刺是腎水克心火此熱已極矣張云岐舌上苔黃熱氣客於胃中舌上苔白熱氣客於胸中同上肺為水母而主氣肺燥則氣之留於胃者少輸於膀胱者多肺氣浹於胃則胃中津液還入於胃而大便通矣王朴莊陽氣絶於里則津液竭熱結於內故大便牢而不通病源陽絶於里者胃中陽熱亢甚脾無陰氣以和之孤陽無偶不至燔灼竭絶不止也趙以德表陽隔絶於里不能外出即太陽陽熱之氣入於地中故陰津消亡而成便硬張隱菴陽絶即亡津液之互辭故仲景於亡津液悉名無陽喻嘉言芤脈浮大而軟按之中央空兩邊實脈經病人不大便五六日則熱邪在裡繞臍痛者入於胃下近於大腸也張隱菴臍者腹之中央內居大腸繞臍而痛乃燥屎結於腸中欲出不出之狀張令韶躁者煩之極即臥不安之貌陽明內實亦令如是不必泥定躁屬少陰也同上陽明病若發汗則躁並此煩躁發作有時皆不宜汗而宜下者呂𣗪村煩者懊憹不眠躁則揚手擲足煩輕而躁重黃仲理燥屎者胃中宿食因胃熱而腸結燥丸之屎也魏荔彤燥屎之為害滋大同上表虛里實是外邪盡入於胃方中行表虛里實者即表和里病之意尤在涇發汗是胃燥之因便難是譫語之根柯韻伯蒸蒸發熱者言熱自內騰達於外猶炊蒸然方中行蒸蒸發熱者熱聚於內而氣蒸於外與太陽邪鬱於外而熱盛於表者不同故彼宜解外而此宜清裡尤在涇諸病皆因於氣穢物之不去由氣之不順也故攻堅之劑必用氣分之藥因以承氣名湯柯韻伯葛根芩連湯主陽明之表三承氣湯主陽明之裡醫宗金鑑下法皆為救陰而設程郊倩大黃蕩滌蘊熱傷寒中要藥也許知可大煩者邪在表也微煩者邪在裡也成無己胃中糟粕為邪所壅留滯於內其未成硬者或時得下其已成硬者終不得出所以有下利者必知其仍有燥屎而仍當下也汪苓友仲景書中有單言潮熱者有單言譫語者至潮熱譫語並見是熱之極重者矣是當另列一款不僅與單言一款者同沈芊緑胃司納胃滿則不能容谷腸司輸腸滿則不能化谷若腸雖滿而胃尚虛則又能食張令韶二陽並病者太陽病氣俱已歸併於陽明無復有惡寒頭痛之表證也陳修園四肢為諸陽之本津液足而熱蒸之則周身汗出津液不足而熱蒸之則手足濈然成無己四肢者諸陽之本熱聚於胃則津液溢於手足陶節庵胃實諸證以手足汗出為可據而觀其潮熱尤為親切以其為陽明主時也柯韻伯表和里病汗之則死下之則愈里和表病下之則死汗之則愈外臺祕要引王叔和語千金作陽虛陰盛陽盛陰虛意同陽明病已離太陽八九而尚有一二在則猶當以下之太早為戒而防結胸與痞也沈芊緑風木之邪干於中土風燥而非熱燥故須待風邪盡歸胃中並於燥糞乃可下之張令韶大便為燥所壅塞其未堅結者或有時而並出故乍易其極堅結者終滯於大腸之中故乍難汪苓友身大熱者表熱也身微熱者裡熱也成無己喘冒至不能臥則有燥屎已的林瀾被下後六七日不大便其煩不解腹滿而痛此為胃內有干糞挾宿食故也或先患寒癖因有宿食又感於寒熱氣相搏故宿食不消病源太陽少陽合病下利半表半裡居多故以黃芩湯和之太陽陽明合病下利表證居多故以葛根湯發之陽明少陽合病下利里證居多故以大承氣攻之醫宗金鑑凡合病皆有下利各從外證以為分別張兼善大承氣證非惟不大便者宜之即下利之證亦有宜從下奪者此通因通用之法不可不知呂𣗪村其脈不負者陽明土金之脈不為少陽木火所克張隱菴負者土受木克金被火刑也若脈滑而數內有宿食則戊土有餘少陽初生之甲木鬱於土中不得暢達故當下之以平土中之敦阜而助初生之甲木張令韶翕奄沈名曰滑陰陽和合故令脈滑今脈滑而數則非陰陽和合之比必胃腑實熱而有宿食也張隱菴陽明脈大少陽脈弦脈得大弦是為本脈宜黃芩湯今脈不大不弦而滑且數則和非木上之為害而為宿食之熱利也故不用黃芩湯而用大承氣張兼善承氣治脈滑數有宿食一證非並治上負不負兩證也林瀾獨語如見鬼狀便是狂沈芊緑獨語如見鬼狀則心主之神氣虛而病合於少陰也少陰之神機樞轉時出時入發則神氣昏憒而不識人張隱菴胃之支脈上絡於心才有壅閉即堵其神氣出入之竅故不識人趙以德試將頸間兩人迎脈按住氣即壅遏不識人人迎者胃脈也故金匱云邪入於腑即不識人徐忠可病人循衣縫譫言者不可治掣衣掇空妄言者死脈經不識人循衣摸床心欲絶也動惕不安肝欲絶也微喘肺欲絶也直視腎欲絶也程知脈滑者通澀者塞凡物理皆以通為生塞為死趙嗣真微者無以上之劇證而但發熱譫語則尚可救故以大承氣湯主之止後服者不必盡劑蓋用之當則大承氣可以養陰用之不當則大承氣亦可亡陰也可不慎歟張令韶汗多則津液外滲加以發熱則津液盡隨熱勢蒸蒸騰達於外更無他法以止其汗惟有急下一法引熱從大腸出庶津液不至盡越於外耳喻嘉言裡熱熾盛蒸騰胃中津液盡越於外非急奪其邪將何以救津液於頃刻間耶沈明宗急下者急引大熱從大腸出庶津液不致盡劫王朴莊發汗不解知汗已誤腹仍滿痛知下已急同上凡病至危必察兩目經云視其目色以知病之存亡也同上目中不了了者乃悍熱之氣循眼系而上走空竅是空竅不虛而熱邪上實也張令韶張隱菴同睛不和者腦為髓海髓之精為瞳子悍熱之氣入絡於腦故也張隱菴無表裡證何故可下以外不惡寒內無譫語而但七八日發熱爍其津液正是陽盛陰虛之時苟不攻之其熱不已而變生焉張元素三急下證乃悍熱之氣而非僅腸胃之燥實後人謂痞滿燥實堅悉具然後可下嗟嗟當急下者病在氣分譬如救火緩則焚矣何可與痞滿燥實堅之證同類而語耶高士宗邪至三陰二三日即口燥咽乾者必其人胃火素盛腎水素虧是當急瀉胃火以救腎水若復遷延時日一到腎水告竭雖下無及醫宗金鑑此時少緩須臾甕乾杯罄喻嘉言少陰邪熱已轉屬於腑胃腑實熱消灼腎水故口燥咽乾用大承氣以瀉腑而實熱自除蓋瀉土乃所以救水也成無己水乾則土燥土燥則水愈干所以急於下也方中行腹脹不大便者陽氣素盛胃有宿食可知所以復轉陽明而成胃實醫宗金鑑陽邪熱結口必乾燥設系陰邪則口中和而不幹燥矣故宜急下之以伐陽即以救陰也程知自利清水謂所下無糟粕也色純青謂所下皆汙水也此屬少陰實熱所以心下必痛為少陰急下之證無疑醫宗金鑑少陰急下三證皆刻不容緩之時與陽明急下三法同源而異派張路玉少陰自利最多如虛寒則下利清穀虛熱則下利膿血溫熱病則自利煩渴及此傳經熱邪則自利純清水並宜下奪清熱蓋其邪熱轉歸陽明而為胃實之證乃挾熱而下利非完穀而不化者比也同上傷寒熱邪入里因而作利者謂之熱利蓋熱邪下注雖利而不得出也尤在涇自利不渴者為臟有寒太陰自受之寒邪也下利欲飲水者為里有熱傳經之邪厥陰受之也同上噦而腹滿者原有伏熱在胃復為水寒相搏陳延之所謂變成壯熱大啘者毋泥於胃中寒冷四字專仗丁香柿蒂也王朴莊噦之一證大抵皆因失下而生便軟惟宜瀉心湯便硬則宜大承氣王海藏經曰在下者引而竭之故當視其前後二陰知其何部不利而分利之則病從下出氣不上逆而腹滿與噦俱除尤在涇胃土萬物所歸無所復傳自太少傳入者衆所共知而於三陰傳入者鮮或能識惟能熟視其微則知三陰急下之證亦多矣成無己陽明病濕熱相黰最易發黃張令韶身無汗則熱不得越小便不利則熱不得降韓祗和頭者諸陽之會邪搏諸陽津液上湊則汗見於頭劉守真茵陳主治熱結黃疸茵陳蒿湯先煮茵陳則大黃從小便出此是祕法故仲景云尿如皂角汁色正赤一宿腹滿減病從小便去也徐洄溪陽明之熱與太陰之濕相窨成黃故如橘色之明亮張隱菴燥熱乃腸胃之實故當從大便而出濕熱成黃乃陽明中見太陰之濕故當從小便而出同上一腹之中上下邪氣俱盛其脈常沉伏不可生疑畏惟下之而脈自漸出也吳人駒諸緊為痛得之沉者熱入心中藏經結胸為陽邪內陷而里未成實既不得從汗外泄亦不得從溺下出勢必夾痰雜食固結不解故燥糞在腸必藉推蕩之力而須朴枳若水食在胃者又必兼破飲之長而用甘遂同一大黃而用法各異尤在涇小結胸按之則痛不似結胸之痛不可近也其脈浮滑不似結胸之脈沉而緊也是以黃連之下熱輕於大黃半夏之破飲緩於甘遂瓜蔞之潤利減於芒硝同上湯有大小之別證有輕重之殊今人多以小陷胸湯治大結胸證皆致不救張令韶喜忘即善忘必兼有如狂之狀此當與太陽經所言參看尤在涇大便以褐色為重深褐色者愈重黑色者尤重色之變也以火燥也如羊血在日中須臾變褐色久則漸變黑色王進之太陽畜血在膀胱故驗其小便之利與不利陽明畜血在腸胃故驗其大便之黑與不黑張隱菴太陽經少血陽明經多血所以陽明畜血宜用抵當湯峻攻之鄭在辛血菀於上而吐血者謂之薄厥血留於下而瘀積者謂之畜血成無己衝脈為血海即血室也男女皆有之王宇泰血室肝也肝之熱者必移其熱於心而不能作汗故但頭汗出而不遍及於身也朱彥修血室二字或主於沖或主於肝一就源頭言之一就藏聚處言之兩說雖異其理則同沈芊緑熱入血室或陽明被火及水結胸皆但頭汗出俱是熱鬱於內而不得越者或吐或下皆所以除其熱耳劉守真婦人經水適來適斷表邪乘血之虛入於血室若晝日譫語為邪客於腑與陽爭也此晝日明瞭暮則譫語如見鬼狀是邪不入腑而入於血室與陰爭也成無己血室有熱遂令譫語非胃家實也仲景恐人作胃實攻之故曰無犯胃氣朱肱芍藥地黃湯療傷寒及溫病應發汗而不發汗之內有畜血者及鼻衄吐血不盡內有瘀血面黃大便黑者此主消化淤血外臺祕要引陳延之小品方即犀角地黃牡丹芍藥四味鄭聲即譫語之聲非譫語之外別有一種鄭聲也張令韶鄭聲譫語略同胃熱不實則神明不至甚亂而口語亦不甚糊塗但說了又說繁言絮語失其常度耳魏荔彤大抵傷寒必先觀兩目目中不了了尚為可治之候直視則為不治之疾成無己喘滿為氣上脫下利為氣下脫皆主死成無己脈來往短者死脈經三焦之氣和則內外和中藏經論中言先硬後溏者四或言小便不利或言小便少知仲景測大便處皆以小便覘之許知可今人但知不大便大便難大便硬者為陽明病亦知小便難小便不利小便數少或不尿者皆陽明病乎柯韻伯必有潮熱乃為里證已具故其熱不潮便非必下之證林瀾轉失氣則知腸胃燥熱之甚故氣不外宣待轉而下若不轉失氣則腸胃雖熱而滲孔未至於燥汪苓友胃中乾燥則欲飲水水入胃中虛寒相搏氣逆則噦其後卻發熱者則熱氣乘虛還復聚於胃中也成無己大便利後脈微澀者止為裡虛猶可治也此不曾大便脈反微澀是正氣內衰為邪所勝故云難治同上嘔者熱在上焦未全入腑故不可下同上合通也陽明病面色通赤者熱在經也不可下之同上心下硬滿則邪氣尚淺未全入腑不可便下同上下後心中懊憹而煩者虛煩也可與梔子豉湯若胃中有燥屎者非虛煩也可用大承氣湯其腹微滿初硬後溏是無燥屎此熱不在胃而在上故不可攻同上小便不利者濕熱蒸淤而發黃以胃中原無燥氣也小便自利者胃干便硬而成實以胃中本有燥氣也程郊倩小便自利津液內竭不可攻之當待津液還胃自欲大便燥屎已至直腸難出肛門之時則於諸引導法擇而用之可也醫宗金鑑小便自利津液未還入胃內竭而硬亦有自欲大便者但苦不能出耳若但有此光景時方可但從外導法程郊倩
